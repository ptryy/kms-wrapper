name: CI

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Install swag CLI
        run: go install github.com/swaggo/swag/v2/cmd/swag@v2.0.0-rc5
      - name: Download modules
        run: go mod download
      - name: swagger-check
        run: make swagger-check
      - run: go vet ./...
      - uses: golangci/golangci-lint-action@v8
        with:
          version: v2.12.2
      - run: go test ./...
      - name: govulncheck
        run: |
          go install golang.org/x/vuln/cmd/govulncheck@latest
          govulncheck ./...

  build:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
      - name: Download modules
        run: go mod download
      - name: Build gateway binary
        run: make build
      - name: Build Vault plugin
        run: make build-plugin
      - name: Upload gateway binary
        uses: actions/upload-artifact@v4
        with:
          name: kms-wrapper
          path: bin/kms-wrapper
          retention-days: 7
      - name: Upload Vault plugin
        uses: actions/upload-artifact@v4
        with:
          name: kms-vault-plugin
          path: vault/plugins/kms-vault-plugin
          retention-days: 7
